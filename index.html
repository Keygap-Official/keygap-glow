<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keygap Glow | Official Beauty Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --light-bg: #fffafa; --text: #111; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #fff; color: var(--text); overflow-x: hidden; }
        
        /* Header Elegante */
        header { padding: 100px 20px 80px; text-align: center; background: linear-gradient(180deg, var(--light-bg) 0%, #fff 100%); }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.8rem; margin: 0; letter-spacing: 5px; text-transform: uppercase; }
        .tagline { font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-top: 15px; font-weight: 600; }

        /* Motore di Ricerca "Glow Bot" */
        .search-container { max-width: 650px; margin: -50px auto 70px; padding: 45px; background: #fff; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.08); text-align: center; border: 1px solid #f0f0f0; }
        .search-container p { margin-bottom: 30px; font-style: italic; color: #555; font-size: 1.1rem; }
        .input-wrapper { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        input[type="text"] { flex: 1; min-width: 280px; padding: 20px 30px; border: 1.5px solid #eee; border-radius: 50px; font-size: 1rem; outline: none; transition: 0.4s; font-family: inherit; }
        input[type="text"]:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .btn-search { background: var(--text); color: #fff; border: none; padding: 20px 45px; border-radius: 50px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-search:hover { background: var(--gold); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }

        /* Galleria Visuale Premium */
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 0 50px 100px; max-width: 1300px; margin: 0 auto; }
        .card { border-radius: 25px; overflow: hidden; position: relative; aspect-ratio: 4/5; cursor: pointer; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1); }
        .card:hover img { transform: scale(1.1); }
        .card-label { position: absolute; bottom: 30px; left: 30px; color: #fff; z-index: 2; }
        .card-label h3 { margin: 0; font-family: 'Playfair Display', serif; font-size: 1.6rem; }
        .card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%); }

        footer { padding: 80px 20px; background: var(--light-bg); text-align: center; font-size: 0.75rem; letter-spacing: 1px; color: #999; border-top: 1px solid #eee; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1>Keygap Glow</h1>
        <div class="tagline">Official Beauty & Body Curator</div>
    </header>

    <section class="search-container">
        <p>Cerca il tuo prossimo segreto di bellezza su Amazon:</p>
        <div class="input-wrapper">
            <input type="text" id="searchInput" placeholder="Es. Olio corpo illuminante, scrub viso, siero..." autocomplete="off">
            <button class="btn-search" onclick="searchNow()">Trova Ora</button>
        </div>
    </section>

    <div class="gallery">
        <div class="card">
            <img src="main_photo.jpg" alt="Rituale di Bellezza">
            <div class="card-label"><h3>Daily Routine</h3></div>
        </div>
        <div class="card">
            <img src="milk_bath.jpg" alt="Vasca di latte">
            <div class="card-label"><h3>Milk Ritual</h3></div>
        </div>
        <div class="card">
            <img src="silk_legs.jpg" alt="Gambe di seta">
            <div class="card-label"><h3>Silk Secrets</h3></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Keygap Glow | Partner Ufficiale Amazon | Ref: keygap-21
    </footer>

    <script>
        function searchNow() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                const tag = "keygap-21"; 
                const url = `https://www.amazon.it/s?k=${encodeURIComponent(query)}&tag=${tag}`;
                window.open(url, '_blank');
            }
        }
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchNow();
        });
    </script>

</body>
</html>
